<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Affan - PWA Mobile HTML Template">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="theme-color" content="#0134d4">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <!-- Title -->
    <title>Подсистема контроля и надзора</title>

    <!-- Favicon -->
    <link rel="icon" href="/favicons/favicon.ico">
    <link rel="apple-touch-icon" href="/favicons/favicon-96x96.png">
    <link rel="apple-touch-icon" sizes="192x192" href="/favicons/icons-192x192.png">
    <link rel="apple-touch-icon" sizes="512x512" href="/favicons/icons-512x512.png">

    <!-- Style CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Web App Manifest -->
    <link rel="manifest" href="manifest.json">
</head>

<body>
<!-- Preloader -->
<div id="preloader">
    <div class="spinner-grow text-primary" role="status">
        <span class="visually-hidden">Загрузка...</span>
    </div>
</div>

<!-- Internet Connection Status -->
<div class="internet-connection-status" id="internetStatus"></div>

<!-- Login Wrapper Area -->
<div class="login-wrapper d-flex align-items-center justify-content-center">
    <div class="custom-container">

        <!-- Register Form -->
        <div class="register-form mt-4">
            <h6 class="mb-3 text-center">Подсистема контроля и надзора</h6>

            <form method="post" class="ajaxFrm" onsubmit="return false" id="login">
                <div class="form-group">
                    <input class="form-control" type="text" id="user" name="user" placeholder="Логин">
                </div>

                <div class="form-group position-relative">
                    <input class="form-control" id="psw-input" type="password" name="password" placeholder="Пароль">
                    <div class="position-absolute" id="password-visibility">
                        <i class="bi bi-eye"></i>
                        <i class="bi bi-eye-slash"></i>
                    </div>
                </div>

                <button class="btn btn-primary w-100" type="submit">Войти</button>
            </form>
        </div>


    </div>
</div>

<!-- Static Backdrop Modal -->
<div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
     aria-labelledby="staticBackdropLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h6 class="modal-title" id="staticBackdropLabel"></h6>
                <button class="btn btn-close p-1 ms-auto" type="button" data-bs-dismiss="modal"
                        aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p class="mb-0"></p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-sm btn-primary" type="button" data-bs-dismiss="modal">Закрыть</button>
                <!--<button class="btn btn-sm btn-success" type="button">I Understood</button>-->
            </div>
        </div>
    </div>
</div>

<!-- All JavaScript Files -->
<script src="/js/assets/jquery-3.6.0.min.js"></script>
<script src="/js/core/tools.js"></script>
<script src="/js/core/app.js"></script>
<script src="js/bootstrap.bundle.min.js"></script>
<script src="js/slideToggle.min.js"></script>
<script src="js/internet-status.js"></script>
<script src="js/tiny-slider.js"></script>
<script src="js/venobox.min.js"></script>
<script src="js/countdown.js"></script>
<script src="js/rangeslider.min.js"></script>
<script src="js/vanilla-dataTables.min.js"></script>
<script src="js/index.js"></script>
<script src="js/imagesloaded.pkgd.min.js"></script>
<script src="js/isotope.pkgd.min.js"></script>
<script src="js/dark-rtl.js"></script>
<script src="js/active.js"></script>
<script src="js/pwa.js"></script>
</body>

</html>
