<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Интерактивная карта</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v8.2.0/ol.css">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
    }
    #map {
      width: 100%;
      height: 100%;
    }
    #controls {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(255, 255, 255, 0.8);
      padding: 10px;
      border-radius: 5px;
      z-index: 1000;
    }
    button {
      padding: 8px 12px;
      margin: 5px 0;
      cursor: pointer;
    }
  </style>
</head>
<body>
<div id="map"></div>
<div id="controls">
  <button id="locate">Мое местоположение</button>
  <button id="clear">Удалить все маркеры</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/ol@v8.2.0/dist/ol.js"></script>
<script>
  // Создаем карту
  const map = new ol.Map({
    target: 'map',
    /*layers: [
      new ol.layer.Tile({
        source: new ol.source.OSM()
      })
    ],*/
    layers: [
      new ol.layer.Tile({
        source: new ol.source.OSM({
          url: 'http://int.rgis.mosreg.ru/wmts/m10/{z}/{x}/{y}.png',//https://{a-c}.tile.openstreetmap.fr/osmfr/{z}/{x}/{y}.png',
          crossOrigin: 'anonymous'
        })
      })
    ],
    view: new ol.View({
      center: ol.proj.fromLonLat([37.6178, 55.7517]), // Москва по умолчанию
      zoom: 10
    })
  });

  // Слой для маркеров
  const markerLayer = new ol.layer.Vector({
    source: new ol.source.Vector()
  });
  map.addLayer(markerLayer);

  // Слой для текущего местоположения
  const locationLayer = new ol.layer.Vector({
    source: new ol.source.Vector()
  });
  map.addLayer(locationLayer);

  // Функция для добавления маркера
  function addMarker(coordinate, isLocation = false) {
    const marker = new ol.Feature({
      geometry: new ol.geom.Point(coordinate)
    });

    marker.setStyle(new ol.style.Style({
      image: new ol.style.Circle({
        radius: 6,
        fill: new ol.style.Fill({
          color: isLocation ? 'blue' : 'red'
        }),
        stroke: new ol.style.Stroke({
          color: 'white',
          width: 2
        })
      })
    }));

    if (isLocation) {
      locationLayer.getSource().clear();
      locationLayer.getSource().addFeature(marker);
    } else {
      markerLayer.getSource().addFeature(marker);
    }
  }

  // Обработчик клика по карте для добавления маркера
  map.on('click', function(evt) {
    addMarker(evt.coordinate);
  });

  // Кнопка для определения местоположения
  document.getElementById('locate').addEventListener('click', function() {
    if ("geolocation" in navigator) {
      navigator.geolocation.getCurrentPosition(
              function(position) {
                const coords = ol.proj.fromLonLat([
                  position.coords.longitude,
                  position.coords.latitude
                ]);
                addMarker(coords, true);
                map.getView().setCenter(coords);
                map.getView().setZoom(15);
              },
              function(error) {
                alert('Ошибка при определении местоположения: ' + error.message);
              },
              { enableHighAccuracy: true }
      );
    } else {
      alert('Геолокация не поддерживается вашим браузером');
    }
  });

  // Кнопка для очистки всех маркеров
  document.getElementById('clear').addEventListener('click', function() {
    markerLayer.getSource().clear();
  });
</script>
</body>
</html>
